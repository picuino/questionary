---

- Title: Maleabilidad
  Question: La propiedad de poder extenderse fácilmente en láminas al aplicar presión se denomina
  Choices:
    - Maleabilidad
    - Ductilidad
    - Tenacidad
    - Elasticidad

- Title: Material maleable
  Question: ¿Qué material es más maleable?
  Choices:
    - Oro
    - Madera
    - Cristal
    - Cuero

- Title: Ductilidad
  Question: La propiedad de poder extenderse fácilmente en hilos al estirar se denomina
  Choices:
    - Ductilidad
    - Maleabilidad
    - Tenacidad
    - Elasticidad

- Title: Material dúctil
  Question: ¿Qué material es más dúctil?
  Choices:
    - Plástico caliente
    - Plástico frío
    - Plastilina
    - Cristal

- Title: Fusibilidad
  Question: La propiedad de poder convertirse en líquido al calentarse se denomina
  Choices:
    - Fusibilidad
    - Ductilidad
    - Maleabilidad
    - Soldabilidad

- Title: Material fusible
  Question: ¿Qué material es más fusible?
  Choices:
    - Estaño
    - Madera
    - Goma de neumático
    - Cuero

- Title: Soldabilidad
  Question: La propiedad de algunos materiales de poder unirse con presión y calor se denomina
  Choices:
    - Soldabilidad
    - Fusibilidad
    - Ductilidad
    - Maleabilidad

- Title: Material soldable
  Question: ¿Qué material es más soldable?
  Choices:
    - Hierro
    - Madera
    - Corcho
    - Papel

- Title: Densidad
  Question: Cuando un litro de material pesa mucho más de un kilo se dice que tiene
  Choices:
    - Mucha densidad
    - Mucha dureza
    - Mucho peso
    - Mucha resistencia mecánica

- Title: Material denso
  Question: ¿Qué material es más denso?
  Choices:
    - Un kilo de plomo
    - Dos kilos de corcho
    - Tres kilos de cristal
    - Cuatro kilos de papel

- Title: Dureza
  Question: La resistencia a ser rayado por otro objeto se denomina
  Choices:
    - Dureza
    - Tenacidad
    - Resistencia mecánica
    - Rayabilidad

- Title: Contrario de dureza
  Question: Lo contrario de un material duro es un material
  Choices:
    - Blando
    - Frágil
    - Plástico
    - Dúctil

- Title: Material duro
  Question: ¿Qué material es más duro?
  Choices:
    - Diamante
    - Estaño
    - Plástico
    - Mármol

- Title: Tenacidad
  Question: La resistencia de un material a ser golpeado sin romperse se denomina
  Choices:
    - Tenacidad
    - Dureza
    - Resistencia mecánica
    - Golpeabilidad

- Title: Contrario de tenacidad
  Question: Lo contrario de un material tenaz es un material
  Choices:
    - Frágil
    - Blando
    - Plástico
    - Dúctil

- Title: Material tenaz
  Question: ¿Qué material es más tenaz?
  Choices:
    - Palo de béisbol de madera
    - Cristal de una ventana
    - Placa de escayola
    - Lavabo de porcelana

- Title: Elasticidad
  Question: La propiedad de poder deformarse y recuperar luego la forma original se denomina
  Choices:
    - Elasticidad
    - Tenacidad
    - Resistencia mecánica
    - Deformabilidad

- Title: Contrario de elasticidad
  Question: Lo contrario de un material elástico es un material
  Choices:
    - Plástico
    - Blando
    - Frágil
    - Dúctil

- Title: Material elástico
  Question: ¿Qué material es más elástico?
  Choices:
    - Neumático de automóvil
    - Plástico fundido
    - Plastilina
    - Cristal

- Title: Resistencia mecánica
  Question: La propiedad de poder soportar esfuerzos sin romperse ni deformarse se denomina
  Choices:
    - Resistencia mecánica
    - Tenacidad
    - Dureza
    - Esforzabilidad

- Title: Material con resistencia mecánica
  Question: ¿Qué material tiene más resistencia mecánica?
  Choices:
    - Barra de acero
    - Barra de madera
    - Barra de cuarzo
    - Barra de plástico

- Title: Conductividad térmica
  Question: La capacidad que tiene un material de transmitir el calor se denomina
  Choices:
    - Conductividad térmica
    - Dilatación térmica
    - Conductividad eléctrica
    - Caloribilidad

- Title: Materiales con Conductividad térmica
  Question: ¿Qué material tendrá mejor conductividad térmica?
  Choices:
    - Un metal
    - El plástico
    - La madera
    - Un material cerámico

- Title: Dilatación térmica
  Question: La propiedad de aumentar de tamaño al calentarse se denomina 
  Choices:
    - Dilatación térmica
    - Conductividad térmica
    - Oxidación
    - Aumentabilidad

- Title: Conductividad eléctrica
  Question: La capacidad que tiene un material de transmitir la electricidad se denomina
  Choices:
    - Conductividad eléctrica
    - Conductividad térmica
    - Dilatación térmica
    - Caloribilidad

- Title: Materiales con Conductividad eléctrica
  Question: ¿Qué material tendrá mejor conductividad eléctrica?
  Choices:
    - Un metal
    - El plástico
    - La madera
    - Un material cerámico

- Title: Oxidación
  Question: La capacidad de combinarse con el oxígeno del aire se denomina
  Choices:
    - Oxidación
    - Corrosión
    - Oxidificación
    - Acidificación

- Title: Material con Oxidación
  Question: ¿Qué material tendrá mas oxidación al aire libre?
  Choices:
    - Hierro
    - Plástico
    - Madera
    - Granito

